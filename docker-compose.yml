version: "3.9"

services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ids_data:/app/data
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    ports:
      - "8050:8050"
    environment:
      - IDS_API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  ids_data:
